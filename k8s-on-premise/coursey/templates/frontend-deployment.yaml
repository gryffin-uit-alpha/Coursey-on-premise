apiVersion: apps/v1
kind: Deployment
metadata:
  name: coursey-frontend
  labels:
    app: coursey-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: coursey-frontend
  template:
    metadata:
      labels:
        app: coursey-frontend
    spec:
      imagePullSecrets:
      - name: harbor-pull-secret
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
